                                                                                                                                       
name: Deploy Python API to EC2                                                                                                         
                                                                                                                                       
# This tells GitHub to run this workflow every time you push code to the 'main' branch                                                 
on:                                                                                                                                    
  push:                                                                                                                                
    branches:                                                                                                                          
      - main                                                                                                                           

jobs:                                                                                                                                  
  deploy:                                                                                                                              
    name: Build and Deploy to EC2                                                                                                      
    runs-on: ubuntu-latest                                                                                                             
                                                                                                                                        
    steps:                                                                                                                             
      - name: Checkout Code                                                                                                            
        uses: actions/checkout@v4                                                                                                      
                                                                                                                                        
      - name: Deploy to EC2 via SSH                                                                                                    
        uses: appleboy/ssh-action@v1.0.3                                                                                               
        with:                                                                                                                          
          host: ${{ secrets.EC2_HOST }}                                                                                                
          username: ${{ secrets.EC2_USERNAME }}                                                                                        
          key: ${{ secrets.EC2_SSH_KEY }}                                                                                              
          script: |                                                                                                                    
            # 1. Clone the repo if it doesn't exist                                                                                    
            if [ ! -d "$HOME/Aws-learn" ]; then                                                                                        
              git clone https://github.com/Acephoeni-X/Aws-learn.git $HOME/Aws-learn                                                   
            fi                                                                                                                         
                                                                                                                                        
            # 2. Navigate to the directory and pull the latest code                                                                    
            cd $HOME/Aws-learn                                                                                                         
            git pull origin main                                                                                                       
                                                                                                                                        
            # 3. Make the deploy script executable and run it                                                                          
            chmod +x build.sh                                                                                                         
            ./build.sh   